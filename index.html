<!DOCTYPE html>
<html>
<head>
  <title>QuickCart</title>
  <h1>welcome to QuickCart</h1>
  <h5>lets us purchase !!</h5>
  <nav class="d-flex gap-3 p-3 bg-dark text-white align-items-center">
    <img src="360_F_286202792_yLD4HEmCF2YpIgevD2sNnOQ8PambyfZn.jpg" class="logo">
    <h3>QuickCart</h3>

    <input id="search" class="form-control w-25" placeholder="Search...">

    <select id="category" class="form-select w-25">
      <option value="all">All</option>
      <option value="electronics">Electronics</option>
      <option value="jewelery">Jewelery</option>
      <option value="men's clothing">Men</option>
      <option value="women's clothing">Women</option>
    </select>

    <select id="sort" class="form-select w-25">
      <option value="">Sort</option>
      <option value="low">Low → High</option>
      <option value="high">High → Low</option>
    </select>

    <h5 id="cart">Cart: 0</h5>
  </nav>

  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  
  <!-- Products -->
  <div id="box" class="row p-3"></div>

  <!-- Modal -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span onclick="closeModal()">X</span>
      <h4 id="mTitle"></h4>
      <p id="mDesc"></p>
      <p id="mPrice"></p>
      <p id="mRating"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
